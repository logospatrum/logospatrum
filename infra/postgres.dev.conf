# Postgres dev tuning for the patristic chat MVP.
# Mounted into the dev container at /etc/postgresql/postgresql.conf
# (docker-compose.dev.yml passes -c config_file=...).
#
# Target: workstation with ~32 GB RAM + NVMe SSD.
# Default Postgres ships with values sized for ~1 GB RAM circa 2010,
# which made our analytics-style queries spill to disk and silently
# downgrade bitmap precision (lossy bitmap → recheck on every row).
#
# Source of truth for what each value does:
#   https://www.postgresql.org/docs/current/runtime-config-resource.html

# --- memory ---
shared_buffers = 4GB                 # ~25% of RAM is a common rule of thumb
effective_cache_size = 16GB          # planner-only hint; the OS already caches
work_mem = 256MB                     # per-operation; matters for sorts + bitmap
maintenance_work_mem = 1GB           # CREATE INDEX, VACUUM
temp_buffers = 32MB                  # session-local temp tables

# --- planner ---
random_page_cost = 1.1               # NVMe SSD; default 4 assumes spinning disk
effective_io_concurrency = 200       # NVMe can issue many concurrent IOs
seq_page_cost = 1.0                  # default; relative anchor for random_page_cost

# --- parallelism ---
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# --- write performance ---
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB

# --- JIT ---
# JIT compilation costs ~5-10ms of LLVM warmup per query and only pays off on
# CPU-bound queries with cost > 100k. Our typical tool queries are sub-1s and
# IO-bound, so JIT is pure overhead. Disable.
jit = off

# --- logging (helpful while we benchmark) ---
log_min_duration_statement = 500ms   # log anything slower than 500ms
log_lock_waits = on
log_temp_files = 0                   # log every external sort that hit disk

# --- connection limits (keep defaults, just being explicit) ---
max_connections = 100

# --- listen / host (must mirror what the image expects) ---
listen_addresses = '*'
