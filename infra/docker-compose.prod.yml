# Production stack for the patristic chat. nginx publishes 80/443 publicly;
# postgres publishes 55432 (non-default port) for ingest from the external
# pipeline. backend and nextjs are reachable only on the internal docker
# network — LangGraph cannot be hit directly from the public Internet
# regardless of any other hardening.
#
# Bring up:   docker compose -f infra/docker-compose.prod.yml up -d --build
# Migrations: docker exec -i <postgres-id> psql -U postgres -d patristic \
#               < infra/migrations/001_init.sql
#             docker exec -i <postgres-id> psql -U postgres -d patristic \
#               < infra/migrations/002_abuse_budget.sql
# Self-signed dev TLS: run infra/nginx/generate-ssl.sh and bind-mount the
#               output into the nginx container's /etc/letsencrypt before
#               first boot, or run init-letsencrypt.sh against a real
#               domain.

services:
  postgres:
    image: pgvector/pgvector:pg16
    networks: [internal]
    # Non-default port published for external pipeline ingest. ufw should
    # restrict 55432/tcp to the workstation IP (or keep it public + rely on
    # the strong PG_PASSWORD + fail2ban for postgres if exposed worldwide).
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: patristic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    # /dev/shm for parallel maintenance workers (HNSW index build allocates
    # DSM segments up to maintenance_work_mem * max_parallel_maintenance_workers).
    # 1GB default = "could not resize shared memory segment" during HNSW rebuild.
    shm_size: 4gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patristic"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/logospatrum/backend:latest
    # NOTE: listens on :8000 (langgraph-built image default), not :2024.
    # Image is produced by .github/workflows/build-and-push.yml via
    # `langgraph build` and pushed to GHCR. Pull it on VPS with:
    #   docker login ghcr.io -u $GHCR_USERNAME -p $GHCR_TOKEN
    #   docker compose -f infra/docker-compose.prod.yml pull backend
    networks: [internal]
    env_file: ../.env
    environment:
      POSTGRES_DSN: postgresql://postgres:${PG_PASSWORD:-postgres}@postgres:5432/patristic
    depends_on:
      postgres:
        condition: service_healthy

  nextjs:
    image: ghcr.io/logospatrum/frontend:latest
    networks: [internal]
    env_file: ../.env
    environment:
      # SSR proxy fetches reach the backend via docker DNS, not the public
      # domain. The browser hits /api/* relatively, the proxy forwards here.
      LANGGRAPH_API_URL: http://backend:8000
      NODE_ENV: production
    depends_on: [backend]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    networks: [internal]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://localhost}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on: [nextjs]

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  letsencrypt:
  certbot-webroot:
