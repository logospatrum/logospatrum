services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: patristic-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: patristic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      # Tuned config (work_mem, shared_buffers, etc — see postgres.dev.conf).
      # Without this the defaults make analytics queries spill to disk.
      - ./postgres.dev.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patristic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data:
