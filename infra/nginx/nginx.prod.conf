# nginx.prod.conf — TEMPLATE rendered by Dockerfile.prod via envsubst.
#
# This file is dropped at /etc/nginx/templates/default.conf.template inside
# the container; the stock nginx:alpine entrypoint (20-envsubst-on-templates.sh)
# renders ${DOMAIN} and ${ALLOWED_ORIGIN} into /etc/nginx/conf.d/default.conf
# before nginx starts. So this file lives in the `http {}` context — no
# `events {}` or `http {}` wrappers (the base /etc/nginx/nginx.conf provides
# them).
#
# Anti-abuse design: docs/superpowers/specs/2026-05-16-anti-abuse-rate-limits-design.md

# === Rate limit zones ===
limit_req_zone  $binary_remote_addr  zone=runs_zone:10m   rate=6r/m;
limit_req_zone  $binary_remote_addr  zone=threads_zone:10m rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=api_zone:10m    rate=60r/m;
limit_req_zone  $binary_remote_addr  zone=mcp_zone:10m    rate=120r/m;
limit_conn_zone $binary_remote_addr  zone=stream_conn:10m;

# Match the JSON error contract — default for limit_conn is 503 which would
# diverge from our 429 envelope.
limit_req_status  429;
limit_conn_status 429;

# === User-agent blacklist (applied to /api/* only — landing page stays
# crawler-friendly for search engine indexing) ===
map $http_user_agent $blocked_ua {
    default 0;
    ~*curl 1;
    ~*wget 1;
    ~*python-requests 1;
    ~*scrapy 1;
    ~*httpie 1;
    ~*go-http-client 1;
    ~*libwww-perl 1;
    ~*"^Java/" 1;
    ~*okhttp 1;
    ""  1;
}

# === Allowed Origin guard (rendered at container start) ===
map $http_origin $allowed_origin {
    default 0;
    "${ALLOWED_ORIGIN}" 1;
}

# === gzip on text payloads ===
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

# === HTTP → HTTPS redirect + ACME challenge ===
server {
    listen 80;
    server_name ${DOMAIN};
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# === Main HTTPS server ===
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    client_body_timeout 10s;
    send_timeout        60s;
    keepalive_timeout   60s;

    # === /api/mcp — public MCP server. NO Origin check (third-party agents
    # call from anywhere). NO UA blacklist (curl/python clients are legitimate
    # MCP transports). Generous 120r/m + 5 concurrent SSE per IP. ===
    location /api/mcp {
        limit_req   zone=mcp_zone burst=20 nodelay;
        limit_conn  stream_conn 5;
        client_max_body_size 16k;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # === /api/runs* — strictest: blocks UA bots, Origin guard, rate cap,
    # connection cap, 32k body cap (~2500 input tokens — enough for any
    # legitimate chat message). SSE long-lived: buffering off, 5min read. ===
    location ~ ^/api/(threads/[^/]+/runs|runs)(/|$) {
        if ($blocked_ua)         { return 403; }
        if ($allowed_origin = 0) { return 403; }
        limit_req   zone=runs_zone burst=3 nodelay;
        limit_conn  stream_conn 3;
        client_max_body_size 32k;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # === /api/threads (POST creates a new thread, GET is non-existent) ===
    location = /api/threads {
        if ($blocked_ua)         { return 403; }
        if ($allowed_origin = 0) { return 403; }
        limit_req zone=threads_zone burst=5 nodelay;
        client_max_body_size 16k;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
    }

    # === Public read-only GET endpoints. The browser issues these as
    # same-origin fetch() without an Origin header (Chrome only sends Origin
    # for cross-origin or non-safe methods), so the $allowed_origin guard
    # would 403 every legitimate landing-page load. UA filter stays on to
    # keep dumb scrapers off. Exact-match (=) wins over the /api/ prefix. ===
    location = /api/info {
        if ($blocked_ua) { return 403; }
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
    }
    location = /api/catalog {
        if ($blocked_ua) { return 403; }
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
    }
    location = /api/openapi.json {
        if ($blocked_ua) { return 403; }
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
    }

    # === /api/* — session refresh and anything else under the proxy ===
    location /api/ {
        if ($blocked_ua)         { return 403; }
        if ($allowed_origin = 0) { return 403; }
        limit_req zone=api_zone burst=20 nodelay;
        client_max_body_size 64k;
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
    }

    # === Everything else (Next.js statics + SSR landing page). UA filter
    # deliberately OFF so search engines can crawl. ===
    location / {
        proxy_pass http://nextjs:3000;
        include /etc/nginx/proxy_common.conf;
    }
}
