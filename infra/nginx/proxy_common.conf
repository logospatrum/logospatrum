# Shared proxy headers + timeouts used by every location block in
# nginx.prod.conf. Kept separate so changes ripple to all routes.

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $server_name;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        "upgrade";
proxy_redirect off;
proxy_connect_timeout 10s;
# Timeouts and buffering are NOT set here because SSE locations in
# nginx.prod.conf override them inline, and nginx >= 1.27 errors on
# duplicate directives even when the later value should win. Per-location
# blocks set their own proxy_send_timeout / proxy_read_timeout /
# proxy_buffering; nginx defaults (60s / 60s / on) apply elsewhere.
proxy_buffer_size 4k;
proxy_buffers     8 4k;
