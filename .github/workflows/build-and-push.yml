name: Build and push images

# Triggers on push to default branch or version tags. Manual dispatch is
# also enabled so we can build a feature-branch image without merging.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: logospatrum

jobs:
  backend:
    name: Build backend (langgraph build, Wolfi distro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install langgraph-cli
        run: pip install -U "langgraph-cli[inmem]"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        working-directory: apps/backend
        run: |
          langgraph build \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/backend:latest

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/backend:latest

  frontend:
    name: Build frontend (Next.js 15 multi-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64 \
            -f apps/frontend/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/frontend:latest \
            apps/frontend
