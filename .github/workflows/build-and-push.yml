name: Build and push images

# Triggers on push to default branch or version tags. Manual dispatch is
# also enabled so we can build a feature-branch image without merging.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: logospatrum

jobs:
  backend:
    name: Build backend (custom slim FastAPI, no langgraph-api runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64 \
            -f apps/backend/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/backend:latest \
            apps/backend

  frontend:
    name: Build frontend (Next.js 15 multi-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_YM_COUNTER_ID=109275789 \
            -f apps/frontend/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/frontend:latest \
            apps/frontend
